---
- name: Restaurar Infraestructura Completa
  hosts: gcp_servers
  become: yes

  tasks:
    - name: 1. Asegurar directorios de proyectos
      file:
        path: "/home/{{ ansible_user }}/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - monitoring
        - proxy

    - name: 2. Corregir permisos para Prometheus
      file:
        path: "/home/{{ ansible_user }}/monitoring/prometheus_data"
        state: directory
        owner: "65534"
        group: "65534"
        mode: '0777'
        recurse: yes

    - name: 3. Sincronizar archivos de configuración
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
      loop:
        - { src: "./monitoring/", dest: "/home/{{ ansible_user }}/monitoring/" }
        - { src: "./proxy/", dest: "/home/{{ ansible_user }}/proxy/" }

    - name: 4. Levantar Stack de Monitoreo
      community.docker.docker_compose_v2:
        project_src: "/home/{{ ansible_user }}/monitoring/"
        state: present

    - name: 5. Levantar Nginx Proxy Manager
      community.docker.docker_compose_v2:
        project_src: "/home/{{ ansible_user }}/proxy/"
        state: present