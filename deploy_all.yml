---
- name: Restaurar y Optimizar Infraestructura Completa
  hosts: gcp_servers
  become: yes

  tasks:
    # --- SECCIÓN DE OPTIMIZACIÓN DE RENDIMIENTO ---
    - name: 1. Crear archivo SWAP de 2GB (Para mitigar los 1GB de RAM)
      command: "{{ item }}"
      with_items:
        - fallocate -l 2G /swapfile
        - chmod 600 /swapfile
        - mkswap /swapfile
        - swapon /swapfile
      args:
        creates: /swapfile # Solo se ejecuta si el archivo no existe

    - name: 2. Hacer el SWAP permanente y ajustar swappiness
      block:
        - lineinfile:
            path: /etc/fstab
            line: '/swapfile none swap sw 0 0'
            state: present
        - sysctl:
            name: vm.swappiness
            value: '10'
            state: present

    # --- SECCIÓN DE ESTRUCTURA Y ARCHIVOS ---
    - name: 3. Asegurar directorios de proyectos
      file:
        path: "/home/{{ ansible_user }}/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - monitoring
        - proxy

    - name: 4. Corregir permisos para Prometheus
      file:
        path: "/home/{{ ansible_user }}/monitoring/prometheus_data"
        state: directory
        owner: "65534"
        group: "65534"
        mode: '0777'
        recurse: yes

    - name: 5. Sincronizar archivos de configuración
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
      loop:
        - { src: "./monitoring/", dest: "/home/{{ ansible_user }}/monitoring/" }
        - { src: "./proxy/", dest: "/home/{{ ansible_user }}/proxy/" }

    # --- SECCIÓN DE DESPLIEGUE ---
    - name: 6. Levantar Stack de Monitoreo
      community.docker.docker_compose_v2:
        project_src: "/home/{{ ansible_user }}/monitoring/"
        state: present

    - name: 7. Levantar Nginx Proxy Manager
      community.docker.docker_compose_v2:
        project_src: "/home/{{ ansible_user }}/proxy/"
        state: present