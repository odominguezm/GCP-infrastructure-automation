---
- name: Restaurar y Optimizar Infraestructura Completa
  hosts: all
  become: yes
  vars:
    deploy_user: "ubuntu"
    deploy_path: "/home/ubuntu"
    backup_path: "/home/ubuntu/backups"

  tasks:
    # --- SECCIÓN 1: OPTIMIZACIÓN DE RENDIMIENTO ---
    - name: 1. Gestionar archivo SWAP de 2GB
      block:
        - name: Crear archivo swap si no existe
          command: fallocate -l 2G /swapfile
          args:
            creates: /swapfile

        - name: Configurar permisos y activar swap
          shell: |
            chmod 600 /swapfile
            mkswap /swapfile
            swapon /swapfile
          when: ansible_swaptotal_mb < 500

    - name: 2. Ajustes de persistencia para SWAP
      block:
        - lineinfile:
            path: /etc/fstab
            line: '/swapfile none swap sw 0 0'
            state: present
        - sysctl:
            name: vm.swappiness
            value: '10'
            state: present

    # --- SECCIÓN 2: ESTRUCTURA Y SEGURIDAD ---
    - name: 3. Asegurar directorios de proyectos y backups
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0755'
      loop:
        - "{{ deploy_path }}/monitoring"
        - "{{ deploy_path }}/proxy"
        - "{{ backup_path }}"

    - name: 4. Permisos específicos para Prometheus
      file:
        path: "{{ deploy_path }}/monitoring/prometheus_data"
        state: directory
        owner: "65534"
        group: "65534"
        mode: '0777'
        recurse: yes

    # --- SECCIÓN 3: SINCRONIZACIÓN BLINDADA ---
    - name: 5. Sincronizar solo definiciones (Sin sobrescribir datos)
      copy:
        src: "{{ item.src }}"
        dest: "{{ deploy_path }}/{{ item.dest }}"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0644'
      loop:
        - { src: "./monitoring/docker-compose.yml", dest: "monitoring/docker-compose.yml" }
        - { src: "./proxy/docker-compose.yml", dest: "proxy/docker-compose.yml" }
      # Esto garantiza que las carpetas /data (donde están tus configs de NPM) no se toquen

    # --- SECCIÓN 4: DESPLIEGUE DE CONTENEDORES ---
    - name: 6. Levantar servicios con Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ item }}"
        state: present
        wait: yes
      loop:
        - "{{ deploy_path }}/monitoring/"
        - "{{ deploy_path }}/proxy/"

    # --- SECCIÓN 5: TAREAS DE MANTENIMIENTO (NUEVO) ---
    - name: 7. Crear script de backup diario (Base de datos NPM)
      copy:
        dest: "{{ deploy_path }}/backup_npm.sh"
        content: |
          #!/bin/bash
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          cp {{ deploy_path }}/proxy/data/database.sqlite {{ backup_path }}/npm_db_$TIMESTAMP.sqlite
          find {{ backup_path }} -name "npm_db_*.sqlite" -mtime +7 -delete
        mode: '0755'
        owner: "{{ deploy_user }}"