name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat <<EOF > ~/.ssh/config
          Host *
              StrictHostKeyChecking no
              KexAlgorithms +ecdh-sha2-nistp256
          EOF

      - name: Run Ansible Playbook
        run: |
          # Buscamos dónde está el archivo site.yml exactamente
          PLAYBOOK_PATH=$(find . -name "site.yml" | head -n 1)
          
          if [ -z "$PLAYBOOK_PATH" ]; then
            echo "ERROR: No se encontró el archivo site.yml en ninguna carpeta del repositorio."
            ls -R
            exit 1
          fi
          
          echo "Playbook encontrado en: $PLAYBOOK_PATH"
          
          # Obtenemos el directorio donde está el playbook
          PLAYBOOK_DIR=$(dirname "$PLAYBOOK_PATH")
          cd "$PLAYBOOK_DIR"
          
          # Ejecutamos Ansible desde esa carpeta
          ansible-playbook -i hosts.ini site.yml \
            -u ubuntu \
            --private-key ~/.ssh/id_rsa \
            -e "ansible_python_interpreter=/usr/bin/python3"