name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar llave SSH segura (Optimizado)
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.GCP_KNOWN_HOSTS }}
          if_key_exists: replace

      - name: 3. Instalar Ansible y Desplegar
        run: |
          pip install ansible
          
          # Generamos el inventario dinámico apuntando a tu IP de GCP
          echo "[gcp_servers]" > inventory_github.ini
          echo "${{ secrets.GCP_IP }} ansible_user=${{ secrets.GCP_USER }}" >> inventory_github.ini
          
          # Ejecutamos el playbook 'deploy_all.yml' que ya incluye la creación del SWAP
          # No necesitamos pasar la llave manualmente, Ansible usará el agente SSH configurado arriba
          ansible-playbook -i inventory_github.ini deploy_all.yml -v