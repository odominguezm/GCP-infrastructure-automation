name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          name: id_rsa_gcp # Nombre exacto que ya definimos
          known_hosts: ${{ secrets.GCP_KNOWN_HOSTS }} # Usa tu secreto o quita la línea si prefieres
          if_key_exists: replace

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.GCP_IP }} >> ~/.ssh/known_hosts

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i "${{ secrets.GCP_IP }}," deploy_all.yml \
            -u ${{ secrets.GCP_USER }} \
            --private-key ~/.ssh/id_rsa_gcp \
            -e "ansible_python_interpreter=/usr/bin/python3"
      - name: Run Ansible Playbook
        run: |
          # Usamos los nombres exactos de tus secretos: GCP_IP y GCP_USER
          ansible-playbook -i "${{ secrets.GCP_IP }}," deploy_all.yml \
            -u ${{ secrets.GCP_USER }} \
            --private-key ~/.ssh/id_rsa_gcp \
            -e "ansible_python_interpreter=/usr/bin/python3"