name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat <<EOF > ~/.ssh/config
          Host *
              StrictHostKeyChecking no
              KexAlgorithms +ecdh-sha2-nistp256
          EOF

      - name: List files for debugging
        run: ls -R

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i hosts.ini site.yml -u ubuntu --private-key ~/.ssh/id_rsa -e "ansible_python_interpreter=/usr/bin/python3"