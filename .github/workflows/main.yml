name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.GCP_IP }} >> ~/.ssh/known_hosts

      - name: Run Ansible Playbook
        run: |
          # Al usar ssh-agent, ya no necesitas pasar --private-key
          ansible-playbook -i "${{ secrets.GCP_IP }}," deploy_all.yml \
            -u ${{ secrets.GCP_USER }} \
            -e "ansible_python_interpreter=/usr/bin/python3"

      - name: Run Ansible Playbook
        run: |
          # Añadimos el argumento para forzar el uso del agente SSH
          ansible-playbook -i "${{ secrets.GCP_IP }}," deploy_all.yml \
            -u ${{ secrets.GCP_USER }} \
            --ssh-common-args="-o StrictHostKeyChecking=no -o ForwardAgent=yes" \
            -e "ansible_python_interpreter=/usr/bin/python3"
      - name: Run Ansible Playbook
        run: |
          # Usamos los nombres exactos de tus secretos: GCP_IP y GCP_USER
          ansible-playbook -i "${{ secrets.GCP_IP }}," deploy_all.yml \
            -u ${{ secrets.GCP_USER }} \
            --private-key ~/.ssh/id_rsa_gcp \
            -e "ansible_python_interpreter=/usr/bin/python3"