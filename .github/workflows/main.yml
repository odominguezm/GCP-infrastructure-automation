name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          # Escribimos la nueva llave ED25519 (que es más corta y no se corrompe)
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_github_actions
          chmod 600 ~/.ssh/id_github_actions
          
          # Escaneamos la IP para evitar el error de "Host key verification failed"
          ssh-keyscan -H ${{ secrets.GCP_IP }} >> ~/.ssh/known_hosts
          
          # Configuramos SSH para que siempre use esta nueva identidad
          cat <<EOF > ~/.ssh/config
          Host *
              IdentityFile ~/.ssh/id_github_actions
              StrictHostKeyChecking no
          EOF

      - name: Run Ansible Playbook
        run: |
          # Un solo paso de Ansible usando la llave id_github_actions
          # Usamos tus secretos: GCP_IP, GCP_USER y la ruta de la nueva llave
          ansible-playbook -i "${{ secrets.GCP_IP }}," deploy_all.yml \
            -u ${{ secrets.GCP_USER }} \
            --private-key ~/.ssh/id_github_actions \
            -e "ansible_python_interpreter=/usr/bin/python3"