name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar llave SSH segura (Optimizado)
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.GCP_KNOWN_HOSTS }}
          if_key_exists: replace

      - name: 3. Instalar Ansible y Desplegar
        run: |
          pip install ansible
          
          # Generamos el inventario
          echo "[gcp_servers]" > inventory_github.ini
          # Forzamos la ruta de la llave que crea la acción por defecto (~/.ssh/id_rsa)
          echo "${{ secrets.GCP_IP }} ansible_user=${{ secrets.GCP_USER }} ansible_ssh_private_key_file=~/.ssh/id_rsa" >> inventory_github.ini
          
          echo "Verificando inventario:"
          cat inventory_github.ini
          
          # Ejecutamos el playbook con un argumento extra para ignorar la verificación estricta de host
          ansible-playbook -i inventory_github.ini deploy_all.yml \
            --ssh-common-args='-o StrictHostKeyChecking=no' -v