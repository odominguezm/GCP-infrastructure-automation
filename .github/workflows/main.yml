name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          # Usamos comillas dobles para que el secreto mantenga sus saltos de línea
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          # Aseguramos que termine con una línea en blanco (vital para libcrypto)
          echo "" >> ~/.ssh/id_rsa 
          chmod 600 ~/.ssh/id_rsa
          
          # Configuración de compatibilidad
          cat <<EOF > ~/.ssh/config
          Host *
              StrictHostKeyChecking no
              KexAlgorithms +ecdh-sha2-nistp256
              PubkeyAuthentication yes
          EOF

      - name: Run Ansible Playbook
        run: |
          # Usamos ubuntu, tu IP fija y el playbook que SI existe: deploy_all.yml
          ansible-playbook -i "${{ secrets.GCP_IP }}," deploy_all.yml \
            -u ubuntu \
            --private-key ~/.ssh/id_rsa \
            -e "ansible_python_interpreter=/usr/bin/python3"